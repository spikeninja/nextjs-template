name: PROJECT_NAME_prod

services:
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: app_prod
    ports:
      - 3001:3001
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://${PG_DB_USER}:${PG_DB_PASSWORD}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    build:
      context: docker
      dockerfile: postgres.Dockerfile
    restart: unless-stopped
    container_name: PROJECT_NAME_pgsql_prod
    environment:
      POSTGRES_DB: ${PG_DB_NAME}
      POSTGRES_USER: ${PG_DB_USER}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: umami
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DB_USER} -d ${PG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: PROJECT_NAME_redis_prod
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    name: PROJECT_NAME_pgsql_data_prod
  redis_data:
    name: PROJECT_NAME_redis_data_prod