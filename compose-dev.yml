name: PROJECT_NAME_dev

services:
  postgres:
    build:
      context: docker
      dockerfile: postgres.Dockerfile
    restart: unless-stopped
    container_name: PROJECT_NAME_pgsql_dev
    environment:
      POSTGRES_DB: ${PG_DB_NAME}
      POSTGRES_USER: ${PG_DB_USER}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: umami
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DB_USER} -d ${PG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: PROJECT_NAME_redis_dev
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    name: PROJECT_NAME_pgsql_data_dev
  redis_data:
    name: PROJECT_NAME_redis_data_dev
